name: Daily At-Close Database Update

on:
  schedule:
    # Triggers once daily at 21:30 UTC Monday-Friday
    # (4:30 PM CDT in Summer / 3:30 PM CST in Winter)
    - cron: '30 21 * * 1-5'
  
  # Keeps the manual "Run workflow" button active for testing
  workflow_dispatch: 

jobs:
  update-sheets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Credentials File
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          echo "$GCP_CREDENTIALS" > credentials.json

      - name: Run Market Update Script
        run: |
          python bot.py
          
      - name: Clean up Credentials
        if: always()
        run: rm -f credentials.json
