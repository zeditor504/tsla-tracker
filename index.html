<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Market Terminal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0; padding: 0; background-color: #000000; 
            font-family: 'Inter Tight', sans-serif; color: #FFFFFF;
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        
        .header { text-align: center; margin-bottom: 15px; }
        
        /* Added a smooth transition so the title fades beautifully between colors */
        .header h1 { 
            margin: 0; font-size: 2.5rem; font-weight: 600; letter-spacing: -0.5px; 
            transition: color 0.4s ease, text-shadow 0.4s ease; 
        }
        .header p { margin: 5px 0 0 0; color: #8E8E93; font-size: 1.1rem; }

        .toggle-container {
            display: flex; gap: 5px; background-color: #1C1C1E; 
            padding: 4px; border-radius: 100px; margin-bottom: 12px;
            width: 85vw; overflow-x: auto; white-space: nowrap;
            -ms-overflow-style: none; scrollbar-width: none;  
        }
        .toggle-container::-webkit-scrollbar { display: none; }
        
        .toggle-btn {
            background: transparent; border: none; color: #8E8E93;
            font-family: 'Inter Tight', sans-serif; font-weight: 600; font-size: 0.9rem;
            padding: 8px 16px; border-radius: 100px; cursor: pointer; 
            transition: all 0.2s ease; flex-shrink: 0; 
        }
        
        /* 1. DEFAULT TIME BUTTON LOGIC */
        .time-btn:hover { color: #FFFFFF; }
        .time-btn.active {
            background-color: #3A3A3C; color: #FFFFFF; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* 2. DYNAMIC BRAND COLOR LOGIC FOR STOCKS (Uses CSS Variables) */
        .symbol-btn:hover { 
            color: var(--brand-color); 
            background-color: rgba(255, 255, 255, 0.05); /* Subtle white highlight on hover */
        }
        .symbol-btn.active {
            background-color: var(--brand-color); 
            color: var(--text-color); /* Automatically flips between black/white text for readability */
            box-shadow: 0 0 12.5px var(--brand-color); /* Emits a neon glow matching the brand */
        }

        .legend-container {
            width: 85vw; display: flex; gap: 20px; margin-bottom: 12px; justify-content: flex-start;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .color-square { width: 12px; height: 12px; border-radius: 3px; }
        .legend-text { font-size: 0.9rem; font-weight: 400; color: #FFFFFF; }

        .chart-wrapper { 
            width: 85vw; height: 55vh; border-radius: 20px; 
            overflow: hidden; box-shadow: 0 10px 30px rgba(255, 255, 255, 0.05); 
        }
        
        .chart-footer {
            width: 85vw; text-align: right; margin-top: 8px;
            font-size: 0.85rem; color: #8E8E93; font-weight: 400;
        }
    </style>
</head>
<body>
    
    <div class="header">
        <h1 id="stock-title" style="color: #E31937; text-shadow: 0px 0px 20px #E3193766;">TSLA</h1>
        <p>Live Market Tracking & Volume</p>
    </div>

    <div class="toggle-container">
        <button class="toggle-btn symbol-btn active" style="--brand-color: #E31937; --text-color: #FFFFFF;" onclick="setSymbol('NASDAQ:TSLA', 'TSLA', '#E31937', this)">TSLA</button>
        <button class="toggle-btn symbol-btn" style="--brand-color: #76B900; --text-color: #000000;" onclick="setSymbol('NASDAQ:NVDA', 'NVDA', '#76B900', this)">NVDA</button>
        <button class="toggle-btn symbol-btn" style="--brand-color: #A2AAAD; --text-color: #000000;" onclick="setSymbol('NASDAQ:AAPL', 'AAPL', '#BFBFBF', this)">AAPL</button>
        <button class="toggle-btn symbol-btn" style="--brand-color: #00A4EF; --text-color: #000000;" onclick="setSymbol('NASDAQ:MSFT', 'MSFT', '#00A4EF', this)">MSFT</button>
        <button class="toggle-btn symbol-btn" style="--brand-color: #FF9900; --text-color: #000000;" onclick="setSymbol('NASDAQ:AMZN', 'AMZN', '#FF9900', this)">AMZN</button>
        <button class="toggle-btn symbol-btn" style="--brand-color: #4285F4; --text-color: #FFFFFF;" onclick="setSymbol('NASDAQ:GOOG', 'GOOG', '#4285F4', this)">GOOG</button>
        <button class="toggle-btn symbol-btn" style="--brand-color: #0668E1; --text-color: #FFFFFF;" onclick="setSymbol('NASDAQ:META', 'META', '#0668E1', this)">META</button>
    </div>

    <div class="toggle-container">
        <button class="toggle-btn time-btn" onclick="setTime('interval', '1', this)">1m</button>
        <button class="toggle-btn time-btn" onclick="setTime('interval', '2', this)">2m</button>
        <button class="toggle-btn time-btn" onclick="setTime('interval', '3', this)">3m</button>
        <button class="toggle-btn time-btn" onclick="setTime('interval', '5', this)">5m</button>
        <button class="toggle-btn time-btn" onclick="setTime('interval', '15', this)">15m</button>
        <button class="toggle-btn time-btn" onclick="setTime('interval', '60', this)">1H</button>
        <button class="toggle-btn time-btn" onclick="setTime('interval', '240', this)">4H</button>
        
        <button class="toggle-btn time-btn" onclick="setTime('range', '1D', this)">24H</button>
        <button class="toggle-btn time-btn" onclick="setTime('range', '5D', this)">Week</button>
        <button class="toggle-btn time-btn" onclick="setTime('range', '1M', this)">Month</button>
        <button class="toggle-btn time-btn active" onclick="setTime('range', 'YTD', this)">YTD</button>
        <button class="toggle-btn time-btn" onclick="setTime('range', 'ALL', this)">Max</button>
    </div>

    <div class="legend-container">
        <div class="legend-item"><div class="color-square" style="background-color: #2863fc;"></div><span class="legend-text">Price Trend</span></div>
        <div class="legend-item"><div class="color-square" style="background-color: #30998b;"></div><span class="legend-text">Demand</span></div>
        <div class="legend-item"><div class="color-square" style="background-color: #e95448;"></div><span class="legend-text">Supply</span></div>
    </div>

    <div class="chart-wrapper">
        <div class="tradingview-widget-container" style="height:100%;width:100%">
          <div id="tradingview_chart" style="height:100%;width:100%"></div>
          <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
          
          <script type="text/javascript">
          
          let currentSymbol = "NASDAQ:TSLA";
          let currentTimeMode = "range"; 
          let currentTimeValue = "YTD";

          function setSymbol(symbolCode, symbolName, brandColor, clickedButton) {
              if (clickedButton) {
                  let buttons = document.querySelectorAll('.symbol-btn');
                  buttons.forEach(btn => btn.classList.remove('active'));
                  clickedButton.classList.add('active');
              }
              currentSymbol = symbolCode;
              
              // NEW: Injects the specific brand color into the header text!
              let titleObj = document.getElementById('stock-title');
              titleObj.innerText = symbolName; 
              titleObj.style.color = brandColor;
              // Adds '66' to the end of the hex code to give the shadow a subtle 40% transparency glow
              titleObj.style.textShadow = `0px 0px 20px ${brandColor}66`;
              
              renderChart();
          }

          function setTime(mode, value, clickedButton) {
              if (clickedButton) {
                  let buttons = document.querySelectorAll('.time-btn');
                  buttons.forEach(btn => btn.classList.remove('active'));
                  clickedButton.classList.add('active');
              }
              currentTimeMode = mode;
              currentTimeValue = value;
              renderChart();
          }

          function renderChart() {
              document.getElementById('tradingview_chart').innerHTML = '';
              
              let widgetConfig = {
                  "autosize": true,
                  "symbol": currentSymbol,   
                  "timezone": "America/Chicago", 
                  "theme": "dark",
                  "style": "3", 
                  "locale": "en",
                  "enable_publishing": false,
                  "allow_symbol_change": false, 
                  "hide_top_toolbar": true, 
                  "hide_legend": true, 
                  "container_id": "tradingview_chart",
              };

              if (currentTimeMode === "range") {
                  widgetConfig.range = currentTimeValue;
              } else {
                  widgetConfig.interval = currentTimeValue;
              }

              new TradingView.widget(widgetConfig);
          }

          renderChart();
          
          </script>
        </div>
    </div>
    
    <div class="chart-footer">Note: All times are in (CT - Central Time Zone).</div>
    
</body>
</html>
