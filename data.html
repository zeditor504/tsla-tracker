<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantitative Database | Live Market Terminal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0; padding: 0; background-color: #000000;
            font-family: 'Inter Tight', sans-serif; color: #FFFFFF;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
            align-items: center;
        }
        
        .header { 
            text-align: center; width: 100%; height: 80px;
            display: flex; justify-content: center; align-items: center; position: relative;
            flex-shrink: 0;
        }
        
        .header h1 { margin: 0; font-size: 1.8rem; font-weight: 600; color: #FFFFFF; letter-spacing: -0.5px; }
        
        .nav-btn {
            position: absolute; left: 20px;
            background-color: #1C1C1E; color: #8E8E93; text-decoration: none;
            padding: 8px 16px; border-radius: 100px; font-weight: 600; font-size: 0.9rem;
            transition: all 0.2s ease; border: 1px solid transparent;
        }
        
        .nav-btn:hover { color: #FFFFFF; background-color: #3A3A3C; }
        
        /* The Responsive Viewport Squeeze */
        .iframe-container {
            flex-grow: 1; /* Automatically consumes exactly the remaining height of the screen */
            width: 100vw; 
            background-color: #000000;
            overflow: hidden; 
            position: relative;
        }
        
        /* The Negative Margin Hack: Pushes Google's white scrollbars completely off the screen! */
        iframe { 
            position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            width: calc(100% + 10px); height: calc(100% + 10px); 
            border: none; display: block; 
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="nav-btn">◀ Back to Charts</a>
        <h1>End-Of-Day Market Close Database</h1>
    </div>

    <div class="iframe-container">
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSMXRNvl_MWdY7TDj8bXruKqlFyoulqEc33XWZ1q5tY9rn2rdLSB6F-VqufSwtHup2eLvZwcBA3fX-j/pubhtml?gid=0&amp;single=true&amp;widget=true&amp;headers=false"></iframe>chrome=false"></iframe>
    </div>

</body>
</html>
